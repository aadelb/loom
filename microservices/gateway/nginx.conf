user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'service=$upstream_addr service_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ─────────────────────────────────────────────────────────────────────────
    # Rate Limiting (per service)
    # ─────────────────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=core_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=redteam_limit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=intel_limit:10m rate=75r/s;
    limit_req_zone $binary_remote_addr zone=infra_limit:10m rate=200r/s;

    # ─────────────────────────────────────────────────────────────────────────
    # Upstream Service Definitions
    # ─────────────────────────────────────────────────────────────────────────

    upstream loom_core {
        least_conn;
        server loom-core:8787 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream loom_redteam {
        least_conn;
        server loom-redteam:8788 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream loom_intel {
        least_conn;
        server loom-intel:8789 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream loom_infra {
        least_conn;
        server loom-infra:8790 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Main Gateway Server
    # ─────────────────────────────────────────────────────────────────────────

    server {
        listen 8800 default_server;
        server_name _;

        # ─────────────────────────────────────────────────────────────────────
        # Health Check Endpoint
        # ─────────────────────────────────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok","gateway":"loom-gateway"}';
            add_header Content-Type application/json;
        }

        # ─────────────────────────────────────────────────────────────────────
        # Service Status (checks all upstream services)
        # ─────────────────────────────────────────────────────────────────────
        location = /status {
            access_log off;
            return 200 '{"gateway":"ok","services":{"core":"8787","redteam":"8788","intel":"8789","infra":"8790"}}';
            add_header Content-Type application/json;
        }

        # ─────────────────────────────────────────────────────────────────────
        # LOOM-CORE: Research tools (fetch, search, deep, markdown)
        # Route: /v1/tools/research_fetch*, /v1/tools/research_search*, etc.
        # ─────────────────────────────────────────────────────────────────────

        location ~ ^/v1/tools/research_(fetch|search|deep|markdown|spider|cache) {
            limit_req zone=core_limit burst=20 nodelay;

            proxy_pass http://loom_core;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Service core;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # ─────────────────────────────────────────────────────────────────────
        # LOOM-REDTEAM: AI safety & adversarial tools
        # Route: /v1/tools/research_reframe*, /v1/tools/research_safety*,
        #        /v1/tools/research_crescendo*, /v1/tools/research_consensus*
        # ─────────────────────────────────────────────────────────────────────

        location ~ ^/v1/tools/research_(reframe|safety|crescendo|consensus|adversarial|ai_safety) {
            limit_req zone=redteam_limit burst=10 nodelay;

            proxy_pass http://loom_redteam;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Service redteam;

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # ─────────────────────────────────────────────────────────────────────
        # LOOM-INTEL: OSINT, dark web, threat intel, privacy tools
        # Route: /v1/tools/research_dark*, /v1/tools/research_threat*,
        #        /v1/tools/research_osint*, /v1/tools/research_privacy*,
        #        /v1/tools/research_leak*, /v1/tools/research_tor*
        # ─────────────────────────────────────────────────────────────────────

        location ~ ^/v1/tools/research_(dark|threat|osint|privacy|leak|tor|social|passive) {
            limit_req zone=intel_limit burst=15 nodelay;

            proxy_pass http://loom_intel;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Service intel;

            proxy_connect_timeout 45s;
            proxy_send_timeout 120s;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # ─────────────────────────────────────────────────────────────────────
        # LOOM-INFRA: Billing, auth, jobs, monitoring
        # Route: /v1/billing/*, /v1/auth/*, /v1/jobs/*, /v1/monitoring/*,
        #        /v1/config/*, /v1/session/*
        # ─────────────────────────────────────────────────────────────────────

        location ~ ^/v1/(billing|auth|jobs|monitoring|config|session) {
            limit_req zone=infra_limit burst=50 nodelay;

            proxy_pass http://loom_infra;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Service infra;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # ─────────────────────────────────────────────────────────────────────
        # Fallback: Try core service for unmatched routes
        # ─────────────────────────────────────────────────────────────────────

        location / {
            limit_req zone=core_limit burst=20 nodelay;

            proxy_pass http://loom_core;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # ─────────────────────────────────────────────────────────────────────
        # Error Pages
        # ─────────────────────────────────────────────────────────────────────

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 503 '{"error":"Service Unavailable","message":"One or more Loom services are down"}';
        }

        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded for this service"}';
        }
    }
}
