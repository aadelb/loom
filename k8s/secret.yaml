apiVersion: v1
kind: Secret
metadata:
  name: loom-secrets
  namespace: loom
  labels:
    app: loom-mcp
    component: secrets
type: Opaque
stringData:
  # LLM Provider API Keys
  GROQ_API_KEY: "YOUR_GROQ_API_KEY_HERE"
  NVIDIA_NIM_API_KEY: "YOUR_NVIDIA_NIM_API_KEY_HERE"
  DEEPSEEK_API_KEY: "YOUR_DEEPSEEK_API_KEY_HERE"
  GOOGLE_AI_KEY: "YOUR_GOOGLE_AI_KEY_HERE"
  MOONSHOT_API_KEY: "YOUR_MOONSHOT_API_KEY_HERE"
  OPENAI_API_KEY: "YOUR_OPENAI_API_KEY_HERE"
  ANTHROPIC_API_KEY: "YOUR_ANTHROPIC_API_KEY_HERE"

  # Search Provider API Keys
  EXA_API_KEY: "YOUR_EXA_API_KEY_HERE"
  TAVILY_API_KEY: "YOUR_TAVILY_API_KEY_HERE"
  FIRECRAWL_API_KEY: "YOUR_FIRECRAWL_API_KEY_HERE"
  BRAVE_API_KEY: "YOUR_BRAVE_API_KEY_HERE"
  NEWS_API_KEY: "YOUR_NEWS_API_KEY_HERE"

  # Infrastructure & Services
  VASTAI_API_KEY: "YOUR_VASTAI_API_KEY_HERE"
  STRIPE_LIVE_KEY: "YOUR_STRIPE_LIVE_KEY_HERE"
  SMTP_USER: "YOUR_SMTP_USER_HERE"
  SMTP_APP_PASSWORD: "YOUR_SMTP_APP_PASSWORD_HERE"
  JOPLIN_TOKEN: "YOUR_JOPLIN_TOKEN_HERE"

  # Specialized Services
  TOR_CONTROL_PASSWORD: "YOUR_TOR_CONTROL_PASSWORD_HERE"
  UMMRO_RAG_URL: "YOUR_UMMRO_RAG_URL_HERE"
  COINMARKETCAP_API_KEY: "YOUR_COINMARKETCAP_API_KEY_HERE"
  INVESTING_API_KEY: "YOUR_INVESTING_API_KEY_HERE"

  # Redis password (if needed)
  REDIS_PASSWORD: "YOUR_REDIS_PASSWORD_HERE"
