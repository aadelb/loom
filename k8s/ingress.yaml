apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loom-ingress
  namespace: loom
  labels:
    app: loom-mcp
    component: ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - loom.example.com
      secretName: loom-tls
  rules:
    - host: loom.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loom-server
                port:
                  number: 8787
