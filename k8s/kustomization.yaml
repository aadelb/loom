apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: loom
  namespace: loom

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - redis.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

labels:
  - pairs:
      app: loom-mcp
      environment: production

commonMetadata:
  labels:
    managed-by: kustomize
