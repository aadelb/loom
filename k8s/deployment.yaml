apiVersion: apps/v1
kind: Deployment
metadata:
  name: loom-server
  namespace: loom
  labels:
    app: loom-mcp
    component: server
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: loom-mcp
      component: server
  template:
    metadata:
      labels:
        app: loom-mcp
        component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8787"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: loom-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Pod anti-affinity to spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - loom-mcp
                    - key: component
                      operator: In
                      values:
                        - server
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              nodeSelector:
                node-role.kubernetes.io/worker: ""

      # Init container to wait for Redis
      initContainers:
        - name: wait-for-redis
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z loom-redis 6379; do
                echo 'Waiting for Redis...'
                sleep 2
              done
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"

      containers:
        - name: loom-server
          image: loom-mcp:0.1.0a1
          imagePullPolicy: IfNotPresent

          # Command to run the MCP server
          command:
            - loom-server

          ports:
            - name: http
              containerPort: 8787
              protocol: TCP
            - name: metrics
              containerPort: 8789
              protocol: TCP

          # Environment variables from ConfigMap and Secrets
          envFrom:
            - configMapRef:
                name: loom-config
            - secretRef:
                name: loom-secrets

          env:
            - name: LOOM_CACHE_DIR
              value: /cache/loom
            - name: LOOM_SESSIONS_DIR
              value: /sessions
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONLOGLEVEL
              valueFrom:
                configMapKeyRef:
                  name: loom-config
                  key: LOG_LEVEL
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          # Resource requests and limits
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          # Liveness probe - HTTP GET on health endpoint
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - HTTP GET on ready endpoint
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2

          # Startup probe for slow-starting containers
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 10

          # Volume mounts
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: sessions
              mountPath: /sessions
            - name: tmp
              mountPath: /tmp

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 15 && kill -TERM 1

      # Volumes
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 2Gi
        - name: sessions
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi

      # Graceful termination
      terminationGracePeriodSeconds: 30

      # DNS policy
      dnsPolicy: ClusterFirst

      # Restart policy
      restartPolicy: Always
