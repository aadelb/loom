# Loom MCP Research Server - Log Rotation Configuration
# Install to: /etc/logrotate.d/loom

/var/log/loom/*.log {
    # Rotate daily
    daily

    # Keep 30 days of rotated logs
    rotate 30

    # Compress rotated logs (gzip)
    compress

    # Delay compression by one rotation cycle
    # (useful for debugging recently rotated logs)
    delaycompress

    # Missing log files should not generate errors
    missingok

    # Don't rotate empty log files
    notifempty

    # Create new log file with specified mode, user, group
    create 0640 loom loom

    # Copy then truncate (preserves file handles)
    copytruncate

    # Send signal to service after rotation
    sharedscripts
    postrotate
        /bin/systemctl is-active --quiet loom && /bin/systemctl reload loom || true
    endscript
}

# SQLite WAL (Write-Ahead Log) files - rotated weekly
/var/lib/loom/**/*.wal {
    weekly
    rotate 4
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    sharedscripts
    postrotate
        /bin/systemctl is-active --quiet loom && /bin/systemctl reload loom || true
    endscript
}

# SQLite journal files - clean up daily
/var/lib/loom/**/*.journal {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    sharedscripts
    postrotate
        /bin/systemctl is-active --quiet loom && /bin/systemctl reload loom || true
    endscript
}

# Optional: Audit logs - monthly retention
/var/log/loom/audit*.log {
    monthly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0640 loom loom
    copytruncate
    sharedscripts
    postrotate
        /bin/systemctl is-active --quiet loom && /bin/systemctl reload loom || true
    endscript
}
