global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.example.com:587"
  smtp_auth_username: "alerts@example.com"
  smtp_auth_password: "your-password-here"
  smtp_require_tls: true
  smtp_from: "loom-alerts@example.com"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  receiver: "default"
  group_by: ["alertname", "severity", "component"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  routes:
    - match:
        severity: critical
      receiver: "critical-escalation"
      repeat_interval: 5m
      continue: true

    - match:
        severity: warning
      receiver: "standard-notifications"
      repeat_interval: 2h
      continue: true

    - match:
        severity: info
      receiver: "info-digest"
      repeat_interval: 24h

receivers:
  - name: "default"
    email_configs:
      - to: "ops@example.com"
        headers:
          Subject: "Loom Alert: {{ .GroupLabels.alertname }}"

  - name: "critical-escalation"
    email_configs:
      - to: "oncall@example.com"
        headers:
          Subject: "CRITICAL: {{ .GroupLabels.alertname }}"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
        channel: "#loom-critical"
        title: "CRITICAL: {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
        send_resolved: true
        color: "danger"
    pagerduty_configs:
      - service_key: "YOUR_PAGERDUTY_SERVICE_KEY"
        description: "{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}"
        details:
          firing: '{{ template "pagerduty.default.instances" .Alerts.Firing }}'

  - name: "standard-notifications"
    email_configs:
      - to: "ops@example.com"
        headers:
          Subject: "Loom Alert: {{ .GroupLabels.alertname }}"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
        channel: "#loom-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
        send_resolved: true
        color: "warning"

  - name: "info-digest"
    email_configs:
      - to: "ops@example.com"
        headers:
          Subject: "[Daily Digest] Loom Informational Alerts"
        html: |
          <h2>Loom Daily Alert Digest</h2>
          {{ range .Alerts }}
          <p><strong>{{ .Labels.alertname }}</strong></p>
          <p>{{ .Annotations.description }}</p>
          {{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "component"]

  - source_match:
      severity: critical
    target_match:
      severity: info
    equal: ["alertname", "component"]

  - source_match:
      severity: warning
    target_match:
      severity: info
    equal: ["alertname", "component"]

  - source_match:
      alertname: "LoomDown"
    target_match_re:
      alertname: "Loom.*"
    equal: ["instance"]
