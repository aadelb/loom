global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "loom-monitoring"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "127.0.0.1:9093"

rule_files:
  - "alerting-rules.yml"

scrape_configs:
  - job_name: "loom"
    static_configs:
      - targets:
          - "127.0.0.1:8787"
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_timestamps: true
    scheme: "http"
    follow_redirects: true
    enable_compression: true
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "loom_.*"
        action: "keep"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "127.0.0.1:9090"
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "127.0.0.1:9100"
    scrape_interval: 30s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "node_memory_MemAvailable_bytes|node_cpu_seconds_total|node_disk_io_reads_completed_total|node_network_receive_bytes_total"
        action: "keep"
