name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Loom Version
      description: What version of Loom are you using? (e.g., 0.1.0, main branch)
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you running on?
      options:
        - Linux (Docker/systemd)
        - macOS (local development)
        - Windows (WSL2)
        - Kubernetes
        - Other
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running Loom?
      options:
        - Docker / docker-compose
        - systemd service
        - Kubernetes
        - Direct Python (python -m loom.server)
        - PyPI package (pip install loom-mcp)
        - Development (git clone + pip install -e)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug you encountered
      placeholder: |
        When I tried to [action], [what happened]
        Expected behavior: [what should have happened]
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide steps to reproduce the issue
      placeholder: |
        1. Run: `loom serve`
        2. Call: `loom fetch https://example.com`
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: error_logs
    attributes:
      label: Error Logs
      description: Paste relevant error messages or logs
      render: bash
      placeholder: |
        Paste the error output here
        Use `journalctl -u loom -n 50` for systemd
        Use `docker logs <container>` for Docker

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Provide relevant environment information
      placeholder: |
        - OS: Linux / macOS / Windows
        - Python version: 3.11 / 3.12 / 3.13
        - RAM: 8GB / 16GB
        - Docker version: (if applicable)
        - API providers in use: Exa, Tavily, NVIDIA NIM, etc.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context that might help
      placeholder: |
        - Configuration file (.env)
        - Network setup (proxy, firewall)
        - Related issues or discussions

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked existing issues and documentation
          required: true
        - label: I have provided steps to reproduce the issue
          required: false
        - label: I have included relevant logs and error messages
          required: false
