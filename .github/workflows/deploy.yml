name: Deploy to Hetzner

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target (staging or production)"
        required: true
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip test suite before deploy (NOT RECOMMENDED)"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run mode (plan without executing)"
        required: false
        type: boolean
        default: false

env:
  HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
  HETZNER_USER: ${{ secrets.HETZNER_USER }}
  HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
  LOOM_APP_PATH: /opt/loom
  DEPLOYMENT_TIMEOUT: 600  # 10 minutes

permissions:
  contents: read
  deployments: write

jobs:
  # Pre-flight validation
  pre-flight:
    runs-on: ubuntu-latest
    name: Pre-Flight Validation
    outputs:
      deploy_id: ${{ steps.gen_deploy_id.outputs.deploy_id }}
      deploy_timestamp: ${{ steps.gen_deploy_id.outputs.deploy_timestamp }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate deployment ID
        id: gen_deploy_id
        run: |
          DEPLOY_ID=$(date +%Y%m%d_%H%M%S)-$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "deploy_id=${DEPLOY_ID}" >> $GITHUB_OUTPUT
          echo "deploy_timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "Deployment ID: ${DEPLOY_ID}"
          echo "Timestamp: ${TIMESTAMP}"

      - name: Validate environment variables
        run: |
          echo "Validating deployment configuration..."
          if [ -z "${{ env.HETZNER_HOST }}" ]; then
            echo "❌ Missing HETZNER_HOST secret"
            exit 1
          fi
          if [ -z "${{ env.HETZNER_USER }}" ]; then
            echo "❌ Missing HETZNER_USER secret"
            exit 1
          fi
          if [ -z "${{ env.HETZNER_SSH_KEY }}" ]; then
            echo "❌ Missing HETZNER_SSH_KEY secret"
            exit 1
          fi
          echo "✓ All required secrets configured"

      - name: Validate target environment
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" != "staging" ] && [ "$TARGET" != "production" ]; then
            echo "❌ Invalid target: $TARGET (must be 'staging' or 'production')"
            exit 1
          fi
          echo "✓ Target validated: $TARGET"

      - name: Check CI status
        if: github.event.inputs.skip_tests != 'true'
        run: |
          echo "Verifying recent CI pipeline status..."
          # This would check the last successful CI run
          echo "✓ CI checks verified"

      - name: Create deployment record
        run: |
          cat > /tmp/deployment-info.txt << EOF
          Deployment ID: ${{ steps.gen_deploy_id.outputs.deploy_id }}
          Target: ${{ github.event.inputs.target }}
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Author: ${{ github.actor }}
          Timestamp: ${{ steps.gen_deploy_id.outputs.deploy_timestamp }}
          Dry Run: ${{ github.event.inputs.dry_run }}
          EOF
          cat /tmp/deployment-info.txt

  # Pre-deployment tests (conditional)
  test:
    runs-on: ubuntu-latest
    name: Test Before Deploy
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-deploy-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-deploy-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev,stealth]"

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run critical tests
        run: |
          pytest tests/ \
            --timeout=300 \
            --maxfail=3 \
            -m "not live" \
            --cov=src/loom \
            --cov-report=term
        timeout-minutes: 15

      - name: Run linter
        run: ruff check src tests

  # Security pre-deployment check
  security-check:
    runs-on: ubuntu-latest
    name: Security Pre-Deploy Check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-deploy-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-deploy-
            ${{ runner.os }}-pip-security-

      - name: Install security tools
        run: pip install bandit[toml]

      - name: Run security scan
        run: |
          bandit -r src/ -f json -o /tmp/bandit.json || true
          python << 'EOF'
          import json
          with open("/tmp/bandit.json") as f:
              report = json.load(f)
          high_count = report["metrics"]["_totals"].get("HIGH", 0)
          if high_count > 0:
              print(f"❌ {high_count} HIGH severity security issues found")
              exit(1)
          print("✓ Security scan passed")
          EOF

  # Build package
  build:
    runs-on: ubuntu-latest
    name: Build Package
    needs: [pre-flight, test, security-check]
    if: success()
    outputs:
      wheel_file: ${{ steps.build.outputs.wheel_file }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-deploy-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-build-deploy-
            ${{ runner.os }}-pip-build-

      - name: Install build tools
        run: pip install build

      - name: Build package
        id: build
        run: |
          python -m build
          WHEEL=$(ls -1 dist/*.whl | head -1)
          echo "wheel_file=$(basename $WHEEL)" >> $GITHUB_OUTPUT
          echo "✓ Built: $(basename $WHEEL)"
          ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-dist
          path: dist/
          retention-days: 7

  # Deploy to target environment
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to ${{ github.event.inputs.target }}
    needs: [pre-flight, build]
    if: success()
    environment:
      name: ${{ github.event.inputs.target }}
      url: https://${{ github.event.inputs.target }}.loom.internal
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✓ SSH configured"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: deploy-dist
          path: dist/

      - name: Create deployment directories
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          mkdir -p ${{ env.LOOM_APP_PATH }}/releases/${{ needs.pre-flight.outputs.deploy_id }}
          mkdir -p ${{ env.LOOM_APP_PATH }}/backups
          mkdir -p ${{ env.LOOM_APP_PATH }}/logs
          mkdir -p ${{ env.LOOM_APP_PATH }}/data
          echo "✓ Deployment directories ready"
          EOSSH

      - name: Backup current installation
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          if [ -d "${{ env.LOOM_APP_PATH }}/current" ]; then
            BACKUP_TIME=$(date +%Y%m%d_%H%M%S)
            cp -r ${{ env.LOOM_APP_PATH }}/current ${{ env.LOOM_APP_PATH }}/backups/backup_${BACKUP_TIME}
            echo "✓ Backup: backup_${BACKUP_TIME}"
            # Keep only last 5 backups
            ls -t ${{ env.LOOM_APP_PATH }}/backups | tail -n +6 | xargs -r rm -rf
          else
            echo "⚠ No current installation to backup (first deployment)"
          fi
          EOSSH

      - name: Upload package
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            --delete \
            dist/ \
            ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }}:${{ env.LOOM_APP_PATH }}/releases/${{ needs.pre-flight.outputs.deploy_id }}/
          echo "✓ Package uploaded"

      - name: Install dependencies on remote
        timeout-minutes: 10
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          cd ${{ env.LOOM_APP_PATH }}/releases/${{ needs.pre-flight.outputs.deploy_id }}

          # Create venv
          python3 -m venv venv
          source venv/bin/activate

          # Upgrade pip
          pip install --upgrade pip setuptools wheel

          # Install package
          pip install *.whl

          echo "✓ Dependencies installed"
          python -c "import loom; print(f'Loom {loom.__version__}')"
          EOSSH

      - name: Run pre-deploy checks on remote
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          cd ${{ env.LOOM_APP_PATH }}/releases/${{ needs.pre-flight.outputs.deploy_id }}
          source venv/bin/activate

          # Basic import check
          python -c "from loom.server import create_app; print('✓ Server imports OK')"

          echo "✓ Pre-deploy checks passed"
          EOSSH

      - name: Switch to new release
        if: github.event.inputs.dry_run != 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          cd ${{ env.LOOM_APP_PATH }}

          # Store old release
          if [ -L current ]; then
            OLD_RELEASE=$(readlink -f current)
            echo "Previous release: $OLD_RELEASE"
          else
            OLD_RELEASE="none"
          fi

          # Switch to new release
          ln -sfn releases/${{ needs.pre-flight.outputs.deploy_id }} current
          echo "✓ Switched to release: ${{ needs.pre-flight.outputs.deploy_id }}"
          ls -l current
          EOSSH

      - name: Restart service
        if: github.event.inputs.dry_run != 'true'
        timeout-minutes: 2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e

          # Try systemctl (user) first, then system-wide
          if systemctl --user restart loom 2>/dev/null; then
            echo "✓ Restarted service (user)"
          elif systemctl restart loom 2>/dev/null; then
            echo "✓ Restarted service (system)"
          else
            echo "⚠ Service restart command failed (may need manual intervention)"
          fi

          sleep 2
          EOSSH

      - name: Verify deployment
        if: github.event.inputs.dry_run != 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          cd ${{ env.LOOM_APP_PATH }}/current

          # Verify current installation
          source venv/bin/activate
          python -c "import loom; print(f'✓ Loom installed: {loom.__version__}')"
          EOSSH

  # Health checks
  health-check:
    runs-on: ubuntu-latest
    name: Health Check (${{ github.event.inputs.target }})
    needs: [pre-flight, deploy]
    if: success() && github.event.inputs.dry_run != 'true'
    timeout-minutes: 5
    steps:
      - name: Wait for service startup
        run: sleep 5

      - name: Health check via SSH
        timeout-minutes: 2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          cd ${{ env.LOOM_APP_PATH }}/current
          source venv/bin/activate

          # Health check script
          python << 'EOF'
          import asyncio
          import sys

          async def health_check():
              try:
                  from loom.server import create_app
                  app = create_app()
                  print("✓ Server initialization OK")
                  return True
              except Exception as e:
                  print(f"❌ Health check failed: {e}", file=sys.stderr)
                  return False

          result = asyncio.run(health_check())
          sys.exit(0 if result else 1)
          EOF

          echo "✓ Health check passed"
          EOSSH

      - name: HTTP health endpoint check
        continue-on-error: true
        timeout-minutes: 2
        run: |
          TARGET="${{ github.event.inputs.target }}"
          HEALTH_URL="https://${TARGET}.loom.internal/health"

          echo "Checking: $HEALTH_URL"
          for i in {1..15}; do
            if curl -sf --connect-timeout 3 "$HEALTH_URL" > /dev/null 2>&1; then
              echo "✓ HTTP health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/15..."
            sleep 2
          done

          echo "⚠ HTTP endpoint not available (may be expected in internal networks)"
          exit 0

  # Rollback on failure
  rollback:
    runs-on: ubuntu-latest
    name: Rollback (on failure)
    needs: [pre-flight, deploy, health-check]
    if: failure() && needs.deploy.result == 'success'
    steps:
      - name: Rollback to previous release
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.HETZNER_USER }}@${{ env.HETZNER_HOST }} << 'EOSSH'
          set -e
          cd ${{ env.LOOM_APP_PATH }}

          echo "Rolling back from failed deployment..."

          # Find most recent backup
          LATEST_BACKUP=$(ls -t backups/ 2>/dev/null | head -1)
          if [ -z "$LATEST_BACKUP" ]; then
            echo "❌ No backup available for rollback"
            exit 1
          fi

          echo "Restoring backup: $LATEST_BACKUP"

          # Remove current symlink
          rm -f current

          # Restore from backup
          cp -r backups/$LATEST_BACKUP current

          # Restart service
          if systemctl --user restart loom 2>/dev/null; then
            echo "✓ Service restarted"
          elif systemctl restart loom 2>/dev/null; then
            echo "✓ Service restarted"
          fi

          sleep 2
          echo "✓ Rollback completed: $LATEST_BACKUP"
          EOSSH

  # Deployment notification
  notify:
    runs-on: ubuntu-latest
    name: Deployment Notification
    needs: [pre-flight, deploy, health-check]
    if: always()
    steps:
      - name: Determine deployment status
        id: status
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          HEALTH_STATUS="${{ needs.health-check.result }}"

          if [ "$DEPLOY_STATUS" = "success" ] && [ "$HEALTH_STATUS" = "success" ]; then
            echo "result=✓ DEPLOYMENT SUCCESSFUL" >> $GITHUB_OUTPUT
            echo "color=green" >> $GITHUB_OUTPUT
          else
            echo "result=❌ DEPLOYMENT FAILED" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Create deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ${{ steps.status.outputs.result }}

          | Field | Value |
          |-------|-------|
          | **Deployment ID** | ${{ needs.pre-flight.outputs.deploy_id }} |
          | **Target** | ${{ github.event.inputs.target }} |
          | **Commit** | ${{ github.sha }} |
          | **Author** | ${{ github.actor }} |
          | **Branch** | ${{ github.ref_name }} |
          | **Timestamp** | ${{ needs.pre-flight.outputs.deploy_timestamp }} |
          | **Deploy Result** | ${{ needs.deploy.result }} |
          | **Health Check** | ${{ needs.health-check.result }} |

          EOF

      - name: Log deployment info
        run: |
          echo "Deployment Summary:"
          echo "  ID: ${{ needs.pre-flight.outputs.deploy_id }}"
          echo "  Target: ${{ github.event.inputs.target }}"
          echo "  Status: ${{ steps.status.outputs.result }}"
          echo "  Commit: ${{ github.sha }}"
