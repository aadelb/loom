name: Journey (live)

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:        # Manual trigger button in GitHub UI

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,stealth]"

      - name: Install Playwright browsers
        run: playwright install chromium firefox

      - name: Fetch Camoufox
        run: python -m camoufox fetch

      - name: Start Loom server
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
        run: |
          python -m loom.server &
          sleep 2
          for i in $(seq 1 30); do
            curl -sf -X POST http://127.0.0.1:8787/mcp \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' && break
            sleep 1
          done
        timeout-minutes: 2

      - name: Run journey test (live)
        run: loom journey-test --live --record --out journey-out
        timeout-minutes: 10

      - name: Upload journey report
        uses: actions/upload-artifact@v4
        with:
          name: journey-live-report-${{ github.run_id }}
          path: journey-out/

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = new Date().toISOString();
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Journey live failed — ${timestamp}`,
              body: `Journey test failed at ${timestamp}\nSee artifact: journey-live-report-${context.runId}`,
              labels: ["journey-failure", "needs-triage"],
            })
