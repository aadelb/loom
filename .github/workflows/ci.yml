name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: MyPy type check
        run: mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,stealth]"
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Run tests with coverage
        run: pytest -v --cov --cov-report=xml --timeout=300
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  journey-mock:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,stealth]"
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Start Loom server
        run: |
          python -m loom.server &
          sleep 2
          for i in $(seq 1 30); do
            curl -sf -X POST http://127.0.0.1:8787/mcp \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' && break
            sleep 1
          done
        timeout-minutes: 2
      - name: Run journey test (mocked fixtures)
        run: loom journey-test --fixtures tests/fixtures/journey --out journey-out
        timeout-minutes: 5
      - name: Upload journey report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journey-report
          path: journey-out/
      - name: Assert journey passed
        run: |
          python << 'EOF'
          import json
          import sys
          with open('journey-out/report.json') as f:
              r = json.load(f)
          if r['fail_count'] > 0:
              print(f"JOURNEY FAILED: {r['fail_count']} step(s)", file=sys.stderr)
              sys.exit(1)
          print(f"Journey OK: {r['ok_count']}/{r['ok_count']+r['fail_count']} steps")
          EOF

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
