name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  CACHE_VERSION: v1

jobs:
  # Pre-flight checks before running expensive jobs
  pre-flight-check:
    runs-on: ubuntu-latest
    name: Pre-Flight Checks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate commit messages
        run: |
          python << 'EOF'
          import subprocess
          import sys

          # Check for conventional commit format in recent commits
          commits = subprocess.check_output(
              ['git', 'log', '--oneline', '-n', '10'],
              text=True
          ).strip().split('\n')

          valid_types = ['feat', 'fix', 'docs', 'test', 'chore', 'ci', 'refactor', 'perf', 'style']
          errors = []

          for commit in commits:
              if ':' not in commit:
                  continue
              msg_type = commit.split(':')[0].strip().split()[-1]
              if msg_type not in valid_types:
                  errors.append(f"Invalid commit type in: {commit}")

          if errors:
              print("Commit message format issues found:", file=sys.stderr)
              for error in errors:
                  print(f"  - {error}", file=sys.stderr)
              # Note: Not blocking, just warning
          else:
              print("✓ Commit messages follow conventional format")
          EOF

      - name: Validate YAML syntax
        run: |
          python << 'EOF'
          import yaml
          import sys
          from pathlib import Path

          yaml_files = list(Path(".github/workflows").glob("*.yml"))
          errors = []

          for yaml_file in yaml_files:
              try:
                  with open(yaml_file) as f:
                      yaml.safe_load(f)
                  print(f"✓ {yaml_file.name}")
              except yaml.YAMLError as e:
                  errors.append(f"{yaml_file.name}: {e}")

          if errors:
              print("YAML validation errors:", file=sys.stderr)
              for error in errors:
                  print(f"  - {error}", file=sys.stderr)
              sys.exit(1)
          EOF

  # Linting stage
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    needs: pre-flight-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ env.CACHE_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev,stealth]"

      - name: Run Ruff linter
        run: ruff check src tests --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check src tests

      - name: Run MyPy type checker
        run: mypy src --junit-xml=/tmp/mypy-junit.xml

      - name: Upload type check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: type-check-results
          path: /tmp/mypy-junit.xml

  # Unit and integration tests with coverage
  test:
    runs-on: ubuntu-latest
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ env.CACHE_VERSION }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-${{ env.CACHE_VERSION }}-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-test-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -e ".[dev,stealth]"

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -v \
            --timeout=300 \
            --maxfail=5 \
            -m "not live" \
            --cov=src/loom \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --junit-xml=/tmp/junit.xml

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            /tmp/junit.xml
            htmlcov/

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-py311
          fail_ci_if_error: false
          verbose: true

      - name: Check coverage threshold
        if: matrix.python-version == '3.11'
        run: |
          python << 'EOF'
          import xml.etree.ElementTree as ET
          import sys

          tree = ET.parse('coverage.xml')
          root = tree.getroot()

          # Extract coverage percentage from Cobertura XML
          line_rate = float(root.get('line-rate', 0))
          coverage_pct = line_rate * 100

          threshold = 80
          print(f"Coverage: {coverage_pct:.1f}% (threshold: {threshold}%)")

          if coverage_pct < threshold:
              print(f"❌ Coverage below threshold", file=sys.stderr)
              sys.exit(1)
          else:
              print(f"✓ Coverage meets threshold")
          EOF

  # Journey/E2E tests with mocked fixtures
  journey-mock:
    runs-on: ubuntu-latest
    name: Journey Tests (Mocked)
    needs: test
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-journey-${{ env.CACHE_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-journey-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-journey-

      - name: Install dependencies
        run: pip install -e ".[dev,stealth]"

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Start Loom MCP server
        run: |
          python -m loom.server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf -X POST http://127.0.0.1:8787/mcp \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{
                "jsonrpc":"2.0",
                "id":1,
                "method":"initialize",
                "params":{
                  "protocolVersion":"2024-11-05",
                  "capabilities":{},
                  "clientInfo":{"name":"ci","version":"1"}
                }
              }'; then
              echo "✓ Server ready"
              exit 0
            fi
            echo "Attempt $i/30: Waiting for server..."
            sleep 1
          done
          echo "❌ Server failed to start"
          exit 1
        timeout-minutes: 2

      - name: Run journey tests (mocked)
        run: |
          pytest tests/journey_e2e.py \
            -v \
            --timeout=300 \
            -m "not live" \
            --junit-xml=/tmp/journey-junit.xml
        timeout-minutes: 10

      - name: Archive journey results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journey-test-results
          path: /tmp/journey-junit.xml

      - name: Stop Loom server
        if: always()
        run: kill ${{ env.SERVER_PID }} 2>/dev/null || true

  # Security scanning (Bandit + Semgrep)
  security:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: lint
    if: success()
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ env.CACHE_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-security-

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -f json -o /tmp/bandit-report.json || true

      - name: Display Bandit results
        run: |
          python << 'EOF'
          import json
          import sys

          with open("/tmp/bandit-report.json") as f:
              report = json.load(f)

          high_count = report["metrics"]["_totals"].get("HIGH", 0)
          medium_count = report["metrics"]["_totals"].get("MEDIUM", 0)

          if high_count > 0 or medium_count > 0:
              print("⚠ Security findings:\n")
              for result in report["results"]:
                  severity = result["severity"]
                  if severity in ["HIGH", "MEDIUM"]:
                      print(f"  [{severity}] {result['test_id']} - {result['issue_text']}")
                      print(f"         at {result['filename']}:{result['line_number']}\n")

          if high_count > 0:
              print(f"❌ HIGH severity issues: {high_count}", file=sys.stderr)
              sys.exit(1)
          else:
              print(f"✓ No HIGH severity issues (MEDIUM: {medium_count})")
          EOF

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-bandit-report
          path: /tmp/bandit-report.json

  # Build and package
  build:
    runs-on: ubuntu-latest
    name: Build Package
    needs: [lint, test, security]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-${{ env.CACHE_VERSION }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-build-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-build-

      - name: Install build tools
        run: pip install build twine

      - name: Build package (wheel + sdist)
        run: python -m build

      - name: Validate package
        run: |
          python << 'EOF'
          import tarfile
          import zipfile
          from pathlib import Path

          dist_dir = Path("dist")
          wheel = list(dist_dir.glob("*.whl"))[0]
          sdist = list(dist_dir.glob("*.tar.gz"))[0]

          print(f"✓ Wheel: {wheel.name} ({wheel.stat().st_size / 1024:.1f} KB)")
          print(f"✓ Sdist: {sdist.name} ({sdist.stat().st_size / 1024:.1f} KB)")

          # Verify wheel contents
          with zipfile.ZipFile(wheel) as z:
              files = z.namelist()
              assert any('loom' in f for f in files), "loom module not found in wheel"
              print(f"  - Wheel contains {len(files)} files")

          # Verify sdist contents
          with tarfile.open(sdist) as t:
              members = t.getmembers()
              assert any('src/loom' in m.name for m in members), "src/loom not in sdist"
              print(f"  - Sdist contains {len(members)} files")

          print("✓ Package validation passed")
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: List artifacts
        run: ls -lh dist/

  # Summary and final status
  ci-summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs: [pre-flight-check, lint, test, journey-mock, security, build]
    if: always()
    steps:
      - name: Determine CI status
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-Flight | ${{ needs.pre-flight-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Journey | ${{ needs.journey-mock.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.pre-flight-check.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.security.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ CI Pipeline Failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✓ CI Pipeline Passed" >> $GITHUB_STEP_SUMMARY
          fi
